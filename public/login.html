<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Ali Usman</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo"><span class="logo-icon">AU</span> Ali Usman</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card">
      <h1>Welcome Back</h1>
      <p class="subtitle">Sign in to access your dashboard</p>

      <div class="auth-tabs">
        <button type="button" class="auth-tab active" id="login-tab">Sign In</button>
        <button type="button" class="auth-tab" id="register-tab">Register</button>
      </div>

      <form id="login-form" class="auth-form active">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" name="email" class="form-control" placeholder="admin@aliusman.dev" required>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Sign In</button>
      </form>

      <form id="register-form" class="auth-form">
        <div class="form-group">
          <label for="register-name">Full Name</label>
          <input type="text" id="register-name" name="name" class="form-control" placeholder="Your name" required>
        </div>
        <div class="form-group">
          <label for="register-email">Email</label>
          <input type="email" id="register-email" name="email" class="form-control" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="register-password">Password</label>
          <input type="password" id="register-password" name="password" class="form-control" placeholder="Min. 6 characters" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Create Account</button>
      </form>

      <p style="text-align:center;margin-top:24px;font-size:0.85rem;color:var(--text-muted)">
        Admin demo: admin@aliusman.dev / Admin@123
      </p>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
